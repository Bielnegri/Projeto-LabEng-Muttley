<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Manter Medalha')}"></head>
<body>
<header
        th:replace="~{fragmentos/header :: header(activePage='Medalha')}"></header>
<div class="container-fluid" style="max-width: 900px; margin: 0 auto;">
    <h2 class="text-center"
        th:text="(${medalha != null} ? 'Editar Medalha' : 'Novo Medalha')"></h2>
    <div th:if="${message != null}"
         class="alert alert-success alert-dismissible fade show text-center"
         role="alert">
        [[${message}]]
        <button type="button" class="close btn-sm" data-dismiss="alert"
                aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

    <form th:action="@{/medalha/salvar}" th:object="${medalha}"
          method="post" >
        <input type="hidden" th:field="*{id}" />

        <div class="form-group" style="margin-top: 20px;">
            <label>Escolha um Aluno:</label>
            <select th:field="*{alunoId}"
                    class="form-control"
                    th:classappend="${#fields.hasErrors('alunoId')} ? 'is-invalid'">
                <option value="">-Selecione um aluno-</option>
                <option th:each="aluno : ${alunos}"
                        th:value="${aluno.id}"
                        th:text="${aluno.nome}"></option>
            </select>
            <div th:errors="*{alunoId}" class="invalid-feedback"></div>
        </div>

        <div class="form-group">
            <label for="nome"> Nome: </label>
            <input class="form-control" type="text" th:field="*{nome}"
                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
            <div th:errors="*{nome}" class="invalid-feedback"></div>
        </div>
        <div class="form-group">
            <label for="descricao"> Descrição: </label>
            <input class="form-control" type="text" th:field="*{descricao}"
                   th:classappend="${#fields.hasErrors('descricao')} ? 'is-invalid'">
            <div th:errors="*{descricao}" class="invalid-feedback"></div>
        </div>
        <button type="submit" class="btn btn-primary">
            <span th:text="${medalha.id != null} ? 'Atualizar' : 'Cadastrar'"></span>
        </button>
        <a th:href="@{/medalha/listagem}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
