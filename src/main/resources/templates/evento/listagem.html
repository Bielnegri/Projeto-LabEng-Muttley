<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Listagem de Eventos')}"></head>
<body>

<header th:replace="~{fragmentos/header :: header(activePage='Evento')}"></header>

<div class="container-fluid" style="max-width: 1000px; margin: 0 auto;">

    <h2 class="text-center">Listagem de Eventos</h2>

    <div th:if="${message != null}"
         class="alert alert-success alert-dismissible fade show text-center"
         role="alert">
        [[${message}]]
        <button type="button" class="close btn-sm" data-dismiss="alert">
            <span>&times;</span>
        </button>
    </div>

    <div th:if="${erro != null}"
         class="alert alert-danger text-center"
         role="alert">
        [[${erro}]]
    </div>

    <div class="mb-3 text-right">
        <a th:href="@{/evento/formulario}" class="btn btn-primary">
            Novo Evento
        </a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="thead-dark">
        <tr>
            <th>ID</th>
            <th>Tema</th>
            <th>Disciplina</th>
            <th>Local</th>
            <th>Data</th>
            <th>Horario</th>
            <th style="width: 180px;">Acoes</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="evento : ${listaEventos}">
            <td th:text="${evento.id}"></td>
            <td th:text="${evento.tema}"></td>
            <td th:text="${evento.disciplina != null ? evento.disciplina.nome : '-'}"></td>
            <td th:text="${evento.local}"></td>
            <td th:text="${#dates.format(evento.data, 'dd/MM/yyyy')}"></td>
            <td th:text="${evento.horario}"></td>

            <td class="text-center">
                <a th:href="@{/evento/formulario/{id}(id=${evento.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/evento/delete/{id}(id=${evento.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Tem certeza que deseja excluir este evento?');">
                    Excluir
                </a>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(listaEventos)}">
            <td colspan="7" class="text-center">
                Nenhum evento cadastrado.
            </td>
        </tr>
        </tbody>
    </table>

</div>

<div th:replace="~{fragmentos/footer :: footer}"></div>

</body>
</html>
