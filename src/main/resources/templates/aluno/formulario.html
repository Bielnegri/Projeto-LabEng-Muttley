<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Manter Aluno')}"></head>
<body>
<header
        th:replace="~{fragmentos/header :: header(activePage='Aluno')}"></header>
<div class="container-fluid" style="max-width: 900px; margin: 0 auto;">
    <h2 class="text-center"
        th:text="(${aluno.id != null} ? 'Editar Aluno' : 'Novo Aluno')"></h2>
    <div th:if="${message != null}"
         class="alert alert-success alert-dismissible fade show text-center"
         role="alert">
        [[${message}]]
        <button type="button" class="close btn-sm" data-dismiss="alert"
                aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

    <form th:action="@{/aluno/salvar}" th:object="${aluno}" method="post" >
        <input type="hidden" th:field="*{id}" />
        <div class="form-group">
            <label for="nome"> Nome: </label>
            <input class="form-control" type="text" th:field="*{nome}"
                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
            <div th:errors="*{nome}" class="invalid-feedback"></div>
        </div>
        <div class="form-group">
            <label for="email"> Email: </label>
            <input class="form-control" type="text" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
            <div th:errors="*{email}" class="invalid-feedback"></div>
        </div>
        <div class="form-group">
            <label for="telefone"> Telefone: </label>
            <input class="form-control" type="text" th:field="*{telefone}"
                   th:classappend="${#fields.hasErrors('telefone')} ? 'is-invalid'">
            <div th:errors="*{telefone}" class="invalid-feedback"></div>
        </div>
        <div class="form-group">
            <label for="instituicao"> Instituição: </label>
            <input class="form-control" type="text" th:field="*{instituicao}"
                   th:classappend="${#fields.hasErrors('instituicao')} ? 'is-invalid'">
            <div th:errors="*{instituicao}" class="invalid-feedback"></div>
        </div>
        <div class="form-group">
            <label for="matricula"> Matrícula: </label>
            <input class="form-control" type="text" th:field="*{matricula}"
                   th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'">
            <div th:errors="*{matricula}" class="invalid-feedback"></div>
        </div>
        <button type="submit" class="btn btn-primary">
            <span th:text="${aluno.id != null} ? 'Atualizar' : 'Cadastrar'"></span>
        </button>
        <a th:href="@{/aluno/listagem}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
